name: Publish Logs Viewer Web Image

on:
  # Publish edge/latest images from main for easy testing.
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  # Allow maintainers to republish manually when needed.
  workflow_dispatch:

permissions:
  contents: read
  # Required for pushing images to GitHub Container Registry (GHCR).
  packages: write

concurrency:
  group: web-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # Guard against transient GitHub fetch 5xx errors seen during checkout.
      - name: Checkout (attempt 1)
        id: checkout_attempt_1
        continue-on-error: true
        uses: actions/checkout@v4

      - name: Checkout (attempt 2)
        id: checkout_attempt_2
        if: steps.checkout_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: actions/checkout@v4

      - name: Checkout (attempt 3)
        if: steps.checkout_attempt_1.outcome == 'failure' && steps.checkout_attempt_2.outcome == 'failure'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute image name
        id: image
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "name=ghcr.io/${owner}/rocketchat-app-logs-viewer-web" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            # Release tags from git tag refs: v0.1.2 -> v0.1.2
            type=ref,event=tag
            # Semantic aliases for release refs: 0.1.2, 0.1, 0
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Immutable trace tag for every publish, including main pushes.
            type=sha,prefix=sha-
            # Stable default tag for main branch deployments.
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: web/Dockerfile.same-origin
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
