apiVersion: v1
kind: Service
metadata:
  name: logs-viewer-web
  labels:
    app.kubernetes.io/name: logs-viewer-web
spec:
  selector:
    app.kubernetes.io/name: logs-viewer-web
  ports:
    # Service stays on 80 while forwarding to unprivileged container port via named target.
    - name: http
      port: 80
      targetPort: http
