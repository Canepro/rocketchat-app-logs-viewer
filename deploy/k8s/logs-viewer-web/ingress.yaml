apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: logs-viewer-web
  # Add cert-manager annotation in overlays when managed certificates are enabled.
  annotations: {}
spec:
  # Keep this overridable because many clusters use "nginx" or cloud-specific classes.
  ingressClassName: traefik
  rules:
    # Replace with your Rocket.Chat public host (same origin as web client session).
    - host: rocketchat.example.com
      http:
        paths:
          - path: /logs-viewer
            pathType: Prefix
            backend:
              service:
                name: logs-viewer-web
                port:
                  number: 80
  tls:
    - hosts:
        - rocketchat.example.com
      # Reuse the workspace TLS secret or provide a dedicated cert for this host.
      secretName: rocketchat-tls
