server {
    # Match the unprivileged image port and avoid privileged bind requirements.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Canonicalize the path to include trailing slash for relative asset links.
    location = /logs-viewer {
        return 301 https://$host/logs-viewer/;
    }

    # Keep asset requests strict so missing files return 404 instead of index fallback.
    location /logs-viewer/assets/ {
        rewrite ^/logs-viewer/assets/(.*)$ /$1 break;
        try_files $uri =404;
    }

    # Route SPA requests through index.html after stripping the /logs-viewer prefix.
    location /logs-viewer/ {
        rewrite ^/logs-viewer/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }
}
